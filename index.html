<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Pacientes</title>
</head>
<body>

  <h2>Cadastro de Pacientes</h2>

  <form id="form">

  <script src="script.js"></script>

</body>
</html>
